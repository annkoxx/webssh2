<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>WebSSH Terminal</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖥️</text></svg>">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="bg-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="gradient-orb orb-4"></div>
    </div>
    <canvas id="particles"></canvas>

    <!-- ==================== LOGIN VIEW ==================== -->
    <div id="loginView" class="view active">
        <div class="login-wrapper">
            <div class="login-container">
                <div class="glass-card login-card animate-in">
                    <div class="card-header">
                        <div class="logo-container">
                            <div class="logo-ring">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="logo-icon">
                                    <path d="M4 17l6-6-6-6M12 19h8" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                        </div>
                        <h1 class="title">WebSSH</h1>
                        <p class="subtitle">安全的远程终端连接</p>
                    </div>

                    <form id="loginForm" class="form-body" autocomplete="off">
                        <div class="input-group">
                            <div class="input-row">
                                <div class="input-field flex-3">
                                    <label>主机地址</label>
                                    <div class="input-wrapper">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                                        <input type="text" id="hostname" placeholder="例如: 192.168.1.100" required>
                                    </div>
                                </div>
                                <div class="input-field flex-1">
                                    <label>端口</label>
                                    <div class="input-wrapper">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
                                        <input type="number" id="port" value="22" min="1" max="65535" required>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="input-group">
                            <div class="input-field">
                                <label>用户名</label>
                                <div class="input-wrapper">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                    <input type="text" id="username" placeholder="root" required>
                                </div>
                            </div>
                        </div>

                        <div class="auth-tabs">
                            <button type="button" class="auth-tab active" data-tab="password" onclick="switchAuthTab('password')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                                密码登录
                            </button>
                            <button type="button" class="auth-tab" data-tab="key" onclick="switchAuthTab('key')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                                密钥登录
                            </button>
                        </div>

                        <div id="passwordAuth" class="auth-panel active">
                            <div class="input-group">
                                <div class="input-field">
                                    <label>密码</label>
                                    <div class="input-wrapper">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                                        <input type="password" id="password" placeholder="输入密码">
                                        <button type="button" class="toggle-pwd" onclick="togglePassword()">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div id="keyAuth" class="auth-panel">
                            <div class="input-group">
                                <div class="input-field">
                                    <label>私钥内容</label>
                                    <textarea id="privateKey" placeholder="粘贴你的私钥内容..." rows="4"></textarea>
                                </div>
                            </div>
                            <div class="input-group">
                                <div class="input-field">
                                    <label>私钥密码 (可选)</label>
                                    <div class="input-wrapper">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                                        <input type="password" id="passphrase" placeholder="如果私钥有密码保护">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- System monitor checkbox -->
                        <label class="checkbox-field" for="enableSysInfo">
                            <input type="checkbox" id="enableSysInfo">
                            <span class="checkbox-custom"></span>
                            <span class="checkbox-label">连接后检测系统信息（每分钟更新）</span>
                        </label>

                        <button type="submit" class="btn-connect" id="connectBtn">
                            <span class="btn-text">连接终端</span>
                            <span class="btn-loader"><span class="spinner"></span>连接中...</span>
                            <div class="btn-ripple"></div>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-arrow"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>
                    </form>

                    <div class="card-footer">
                        <div class="status-indicator" id="statusIndicator">
                            <span class="status-dot"></span>
                            <span class="status-text">就绪</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bookmark Panel (Login View - right side) -->
            <div class="bookmark-panel glass-card" id="bookmarkPanel">
                <div class="bookmark-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
                    <span>书签</span>
                    <button class="bm-toggle-btn" id="bmToggleBtn" onclick="toggleBookmarkPanel()" title="收起书签">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                </div>
                <div class="bookmark-list" id="bookmarkList"></div>
                <button class="bm-add-btn" onclick="saveCurrentAsBookmark()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    保存当前连接
                </button>
            </div>
        </div>

        <!-- Mobile bookmark toggle button -->
        <button class="bm-float-btn" id="bmFloatBtn" onclick="toggleBookmarkPanel()" title="书签">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        </button>
    </div>

    <!-- ==================== TERMINAL VIEW ==================== -->
    <div id="terminalView" class="view">
        <div class="terminal-topbar glass-bar" id="terminalTopbar">
            <div class="topbar-left">
                <div class="terminal-dots">
                    <span class="dot red" onclick="disconnect()" title="断开"></span>
                    <span class="dot yellow" onclick="reconnect()" title="重连"></span>
                    <span class="dot green"></span>
                </div>
                <div class="topbar-identity">
                    <span class="topbar-user" id="topbarUser">root@host</span>
                </div>
            </div>
            <div class="topbar-metrics" id="topbarMetrics"></div>
            <div class="topbar-right">
                <button class="action-btn" onclick="reconnect()" title="重新连接">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
                </button>
                <button class="action-btn danger" onclick="disconnect()" title="断开连接">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M18.36 6.64a9 9 0 11-12.73 0M12 2v10"/></svg>
                </button>
            </div>
        </div>
        <div id="terminal" class="terminal-body"></div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
